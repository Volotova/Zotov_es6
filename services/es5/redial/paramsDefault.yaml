---
redial:
  defaultTimeZone: 0
  callAttempts: 4
  dialSchedule: 
    allowedDays:
      - "mon"
      - "tue"
      - "wed"
      - "thu"
      - "fri"
      - "sat"
      - "sun"
    allowedTime:
      default: 
        - localTimeFrom: "11:00"
          localTimeTo: "21:00"
  time:
    # утром
    morning:
      from: "09:30"
      to: "10:30"
      # новый звонок будет через
      retryInterval: 35 # в минутах
      # задержка от текущего момента
      delay: 720 # в минутах (12 часов)
    # в первой половине дня
    am:
      from: "09:30"
      to: "10:30"
      # новый звонок будет через
      retryInterval: 35 # в минутах
      # задержка от текущего момента
      delay: 720 # в минутах (12 часов)
    # до обеда
    before_lunch:
      from: "09:30"
      to: "10:30"
      # новый звонок будет через
      retryInterval: 35 # в минутах
      # задержка от текущего момента
      delay: 720 # в минутах (12 часов)
    # днем
    afternoon:
      from: "14:00"
      to: "15:00"
      # новый звонок будет через
      retryInterval: 35 # в минутах
      # задержка от текущего момента
      delay: 30 # в минутах
    # в обед
    lunch:
      from: "13:00"
      to: "14:00"
      # новый звонок будет через
      retryInterval: 35 # в минутах
      # задержка от текущего момента
      delay: 30 # в минутах
    # после обеда
    after_lunch:
      from: "15:00"
      to: "16:00"
      # новый звонок будет через
      retryInterval: 35 # в минутах
      # задержка от текущего момента
      delay: 30 # в минутах
    # во второй половине дня
    pm:
      from: "16:00"
      to: "17:00"
      # новый звонок будет через
      retryInterval: 35 # в минутах
      # задержка от текущего момента
      delay: 30 # в минутах
    # вечером
    evening:
      from: "18:00"
      to: "20:00"
      # новый звонок будет через
      retryInterval: 35 # в минутах
      # задержка от текущего момента
      delay: 60 # в минутах
    # ночью
    night:
      from: "20:00"
      to: "21:00"
      # новый звонок будет через
      retryInterval: 35 # в минутах
      # задержка от текущего момента
      delay: 30 # в минутах
    # в выходные
    weekend:
      from: "12:00"
      to: "18:00"
      # новый звонок будет через
      retryInterval: 35 # в минутах
      # задержка от текущего момента
      delay: 30 # в минутах
    # интервал рассылки
    default:
      from: "10:30"
      to: "19:30"
      # интервал от времени, названного пользователем,
      # до окончания звонков
      interval: 60 # в минутах
      delay: 30 # в минутах
      retryInterval: 35 # в минутах
    minimalDelay: 15 # в минутах
    recallTime: 60 # в минутах
    maxTime: 7 # в днях
