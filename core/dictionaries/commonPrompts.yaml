GetRedialTime: |
    ЗАДАЧА:
    Проанализируй диалог клиента с ботом и определи:
    1. Просит ли клиент перезвонить (callRequested: true/false)
    2. В какое конкретное время (datetimeISO в формате ISO 8601)

    ВХОДНЫЕ ДАННЫЕ:
    - Текущее время: ${nowStr}
    - Текущий день недели: ${currentWeekday}
    - Диалог: ${chatHistory}

    ПРАВИЛА ОБРАБОТКИ:
    1. callRequested = true, если клиент:
        - Явно просит перезвонить
        - Указывает конкретное время
        - Говорит "да", "хорошо", "договорились" и т.п.
   
    2. callRequested = false, если клиент:
        - Отказывается от звонка ("нет", "не нужно", "не звоните")
        - Просит не беспокоить
        - Дает неопределенный ответ без согласия

    3. Для определения времени:
        - Если указано только время (например, "в 15:00") - используй сегодняшнюю дату
        - Если указан день недели - найди ближайший такой день
        - Если сказано "завтра" - добавь 1 день к текущей дате
        - Если сказано "через час/2 часа" - добавь к текущему времени
        - Если названо несколько времен или дат, выбери ближайшую
        - Если время и дата не указано конкретно, но есть согласие - используй null
        - Если указана дата, но не указано конкретное время, используй текущее время, но измени дату на названную клиентом

    4. Формат времени: ISO 8601 (YYYY-MM-DDTHH:mm:ss.sssZ)

    ОТВЕТ:
        Верни ТОЛЬКО JSON в указанном формате без дополнительных комментариев:
        {"callRequested": boolean, "datetimeISO": string|null}